_schema-version: '3.2'
ID: universal-sap-mcp
version: 1.0.0
description: "Universal SAP MCP Server with Authenticated App Router"
parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npm run build

modules:
  # --- The Node.js MCP Server (Backend API) ---
  - name: sap-mcp-server
    type: nodejs
    path: .
    build-parameters:
      ignore: ["node_modules/"]
    parameters:
      memory: 256M
      disk-quota: 512M
    requires:
      - name: mcp-uaa
      - name: mcp-destination
      - name: mcp-connectivity
    provides:
      - name: mcp-backend-api
        properties:
          url: ${default-url}

  # --- NEW: App Router (Authentication Gateway) ---
  - name: mcp-app-router
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 256M
    requires:
      - name: mcp-uaa
      - name: mcp-backend-api
        group: destinations
        properties:
          name: mcp-backend-api
          url: ~{url}
          forwardAuthToken: true # Required for Principal Propagation

resources:
  # --- XSUAA Service (Authentication) ---
  - name: mcp-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: mcp-sap-appname
        tenant-mode: dedicated

  # --- Destination Service ---
  - name: mcp-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  # --- Connectivity Service ---
  - name: mcp-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite